name: Build RockNix Manager AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-pip libfuse2 python3-dev binutils

      - name: Instalar PyInstaller
        run: |
          # O PyInstaller vai transformar seu .py em um executável Linux real
          python3 -m pip install --upgrade pip
          python3 -m pip install pyinstaller

      - name: Transformar Script em Executável
        run: |
          # Isso cria um arquivo único que roda no Linux sem precisar de Python instalado
          pyinstaller --onefile --windowed --name rocknix_manager rocknix_manager.py

      - name: Baixar AppImage Tool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Preparar Estrutura AppDir
        run: |
          mkdir -p RockNix.AppDir/usr/bin
          cp dist/rocknix_manager RockNix.AppDir/usr/bin/
          
          # Criar ícone e desktop se não existirem
          touch icon.png
          echo -e "[Desktop Entry]\nType=Application\nName=RockNix Manager\nExec=rocknix_manager\nIcon=icon\nCategories=Utility;" > RockNix.AppDir/rocknix-manager.desktop
          cp icon.png RockNix.AppDir/icon.png
          
          # Criar o AppRun (o coração do AppImage)
          echo -e '#!/bin/sh\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "${HERE}/usr/bin/rocknix_manager" "$@"' > RockNix.AppDir/AppRun
          chmod +x RockNix.AppDir/AppRun

      - name: Gerar Arquivo Final AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage RockNix.AppDir RockNix_Manager-Linux.AppImage

      - name: Salvar Arquivo Pronto
        uses: actions/upload-artifact@v4
        with:
          name: RockNix-Manager-Linux
          path: RockNix_Manager-Linux.AppImage
