name: Build RockNix Manager AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-pip libfuse2 python3-dev

      - name: Instalar Gerador de AppImage Python
        run: |
          # Instalando a ferramenta que empacota o Python de forma estável
          python3 -m pip install targeted-python-appimage

      - name: Gerar AppImage
        run: |
          # Criando arquivos básicos necessários para o pacote não dar erro
          touch icon.png
          
          # Se o seu arquivo desktop não existir, este comando cria um básico
          if [ ! -f rocknix-manager.desktop ]; then
            echo -e "[Desktop Entry]\nType=Application\nName=RockNix Manager\nExec=rocknix_manager\nIcon=icon\nCategories=Utility;" > rocknix-manager.desktop
          fi

          # Comando para construir o AppImage do seu script
          # Ele vai baixar o Python isolado e colocar seu script dentro
          python3 -m targeted_python_appimage \
            --python-version 3.11 \
            --executable rocknix_manager.py \
            --desktop-file rocknix-manager.desktop \
            --icon-file icon.png \
            --output RockNix_Manager-Linux.AppImage

      - name: Salvar Arquivo Pronto
        uses: actions/upload-artifact@v4
        with:
          name: RockNix-Manager-Linux
          path: RockNix_Manager-Linux.AppImage
