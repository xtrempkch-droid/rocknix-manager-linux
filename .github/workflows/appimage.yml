name: Build RockNix Manager AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-pip libfuse2 python3-dev

      - name: Baixar Ferramentas de Build
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-python/releases/download/continuous/linuxdeploy-plugin-python-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-python-x86_64.AppImage

      - name: Gerar AppImage
        env:
          PYTHON_VERSION: "3.11"
          APPIMAGETOOL_CACHE_ALLOWED: "1"
          OUTPUT: "RockNix_Manager-Linux.AppImage"
        run: |
          # Criar um arquivo de ícone simples se não existir
          touch icon.png 
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e rocknix_manager.py \
            -d rocknix-manager.desktop \
            -i icon.png \
            --plugin python \
            --output appimage

      - name: Salvar Arquivo Pronto
        uses: actions/upload-artifact@v4
        with:
          name: RockNix-Manager-Linux
          path: RockNix_Manager-Linux.AppImage
